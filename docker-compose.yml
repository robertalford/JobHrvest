services:
  # ─── Databases & Infrastructure ───────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: jobharvest-postgres
    restart: unless-stopped
    # Tuned for SSD-backed Docker storage: lower random_page_cost encourages
    # index scans over seq scans, which are critical for ORDER BY + LIMIT queries.
    command: >
      postgres
        -c random_page_cost=1.1
        -c seq_page_cost=1.0
        -c effective_cache_size=512MB
        -c shared_buffers=512MB
        -c work_mem=4MB
        -c effective_io_concurrency=200
        -c idle_in_transaction_session_timeout=30000
        -c max_connections=300
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobharvest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobharvest}
      POSTGRES_DB: ${POSTGRES_DB:-jobharvest}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobharvest}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jobharvest-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: jobharvest-ollama
    restart: unless-stopped
    environment:
      # 8GB RAM + 4GB swap. One model loaded at a time — swaps when tier escalates.
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11435:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Pull the default model on first start
    entrypoint: >
      sh -c "ollama serve &
             sleep 15 &&
             ollama pull ${OLLAMA_MODEL:-llama3.1:8b} &&
             wait"

  # ─── Backend ──────────────────────────────────────────────────────────────

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobharvest-api
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=ollama
    volumes:
      - ./backend:/app
      - ./storage:/storage
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Worker 1 — crawl & discovery tasks (highest concurrency for I/O-bound work)
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobharvest-celery-worker
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=ollama
      - CELERY_WORKER=true
    volumes:
      - ./backend:/app
      - ./storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-32} -Q crawl,discovery,default,celery --prefetch-multiplier=1 --hostname=worker1@%h

  # Worker 2 — additional crawl worker (parallel throughput)
  celery-worker-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobharvest-celery-worker-2
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=ollama
      - CELERY_WORKER=true
    volumes:
      - ./backend:/app
      - ./storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-32} -Q crawl,discovery,default,celery --prefetch-multiplier=1 --hostname=worker2@%h

  # Worker 3 — additional crawl worker (extra parallel throughput)
  celery-worker-3:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobharvest-celery-worker-3
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=ollama
      - CELERY_WORKER=true
    volumes:
      - ./backend:/app
      - ./storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-32} -Q crawl,discovery,default,celery --prefetch-multiplier=1 --hostname=worker3@%h

  # Worker 4 — dedicated crawl queue (pure job-crawling throughput)
  celery-worker-4:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobharvest-celery-worker-4
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=ollama
      - CELERY_WORKER=true
    volumes:
      - ./backend:/app
      - ./storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-32} -Q crawl --prefetch-multiplier=1 --hostname=worker4@%h

  # Worker 5 — dedicated crawl queue (pure job-crawling throughput)
  celery-worker-5:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobharvest-celery-worker-5
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=ollama
      - CELERY_WORKER=true
    volumes:
      - ./backend:/app
      - ./storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-32} -Q crawl --prefetch-multiplier=1 --hostname=worker5@%h

  # Worker 4 — ML & analytics tasks (LLM-aware, controlled concurrency)
  celery-worker-ml:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobharvest-celery-worker-ml
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=ollama
      - CELERY_WORKER=true
    volumes:
      - ./backend:/app
      - ./storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=${CELERY_ML_CONCURRENCY:-6} -Q ml,default --prefetch-multiplier=1 --hostname=worker-ml@%h

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobharvest-celery-beat
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=ollama
      - CELERY_WORKER=true
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler

  # ─── Frontend ─────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: jobharvest-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app                 # live source mount — HMR picks up all changes
      - frontend_node_modules:/app/node_modules  # keep node_modules in a named volume
    ports:
      - "5173:5173"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Reverse Proxy ────────────────────────────────────────────────────────

  caddy:
    image: caddy:2-alpine
    container_name: jobharvest-caddy
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  caddy_data:
  caddy_config:
  frontend_node_modules:
