# ── Moonlight server deployment ───────────────────────────────────────────────
# Run with: docker compose -f docker-compose.server.yml up -d
# Native Linux Docker — no Colima, production frontend build, tuned for 60GB RAM / 16-thread CPU

services:
  # ─── Databases & Infrastructure ───────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: jobharvest-postgres
    restart: unless-stopped
    # Tuned for 60GB RAM server — much larger buffers than local dev
    command: >
      postgres
        -c random_page_cost=1.1
        -c seq_page_cost=1.0
        -c effective_cache_size=20GB
        -c shared_buffers=4GB
        -c work_mem=32MB
        -c effective_io_concurrency=200
        -c idle_in_transaction_session_timeout=30000
        -c max_connections=300
        -c max_parallel_workers=8
        -c max_parallel_workers_per_gather=4
        -c max_worker_processes=16
        -c maintenance_work_mem=1GB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=64MB
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobharvest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobharvest}
      POSTGRES_DB: ${POSTGRES_DB:-jobharvest}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobharvest}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jobharvest-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --maxmemory 4gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: jobharvest-ollama
    restart: unless-stopped
    environment:
      # 60GB RAM: run multiple models loaded simultaneously
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-4}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-2}
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11435:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    # Pull both models on first start
    entrypoint: >
      sh -c "ollama serve &
             sleep 20 &&
             ollama pull ${OLLAMA_FAST_MODEL:-llama3.1:8b} &&
             ollama pull ${OLLAMA_MODEL:-llama3.1:70b} &&
             wait"

  # ─── Backend ──────────────────────────────────────────────────────────────

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobharvest-api
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=ollama
    volumes:
      - ./backend:/app
      - ./storage:/storage
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python scripts/ensure_auth.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Workers 1-3 — crawl, discovery, default (I/O-bound, high concurrency)
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobharvest-celery-worker
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=ollama
      - CELERY_WORKER=true
    volumes:
      - ./backend:/app
      - ./storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-16} -Q crawl_sites,crawl_jobs,crawl,geocoder,discovery,default,celery --prefetch-multiplier=1 --hostname=worker1@%h

  celery-worker-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobharvest-celery-worker-2
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=ollama
      - CELERY_WORKER=true
    volumes:
      - ./backend:/app
      - ./storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-16} -Q crawl_sites,crawl_jobs,crawl,geocoder,discovery,default,celery --prefetch-multiplier=1 --hostname=worker2@%h

  celery-worker-3:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobharvest-celery-worker-3
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=ollama
      - CELERY_WORKER=true
    volumes:
      - ./backend:/app
      - ./storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-16} -Q crawl_sites,crawl_jobs,crawl,geocoder,discovery,default,celery --prefetch-multiplier=1 --hostname=worker3@%h

  # Workers 4-6 — dedicated crawl queue (pure job-crawling throughput)
  celery-worker-4:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobharvest-celery-worker-4
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=ollama
      - CELERY_WORKER=true
    volumes:
      - ./backend:/app
      - ./storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-16} -Q crawl_jobs,crawl_sites,crawl,geocoder,discovery,default,celery --prefetch-multiplier=1 --hostname=worker4@%h

  celery-worker-5:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobharvest-celery-worker-5
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=ollama
      - CELERY_WORKER=true
    volumes:
      - ./backend:/app
      - ./storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-16} -Q crawl_jobs,crawl_sites,crawl,geocoder,discovery,default,celery --prefetch-multiplier=1 --hostname=worker5@%h

  celery-worker-6:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobharvest-celery-worker-6
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=ollama
      - CELERY_WORKER=true
    volumes:
      - ./backend:/app
      - ./storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-16} -Q crawl_jobs,crawl_sites,crawl,geocoder,discovery,default,celery --prefetch-multiplier=1 --hostname=worker6@%h

  # ML worker — LLM inference tasks (70B model, controlled concurrency)
  celery-worker-ml:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobharvest-celery-worker-ml
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=ollama
      - CELERY_WORKER=true
    volumes:
      - ./backend:/app
      - ./storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=${CELERY_ML_CONCURRENCY:-8} -Q ml,default --prefetch-multiplier=1 --hostname=worker-ml@%h

  # Dedicated company_config worker — handles company discovery separately from job crawling
  celery-worker-company:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobharvest-celery-worker-company
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=ollama
      - CELERY_WORKER=true
    volumes:
      - ./backend:/app
      - ./storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=8 -Q company_config,geocoder,default --prefetch-multiplier=1 --hostname=worker-company@%h

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobharvest-celery-beat
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=ollama
      - CELERY_WORKER=true
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler

  # ─── Frontend — production nginx build ────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobharvest-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Reverse Proxy ────────────────────────────────────────────────────────

  caddy:
    image: caddy:2-alpine
    container_name: jobharvest-caddy
    restart: unless-stopped
    ports:
      - "9080:80"
      - "9443:443"
    volumes:
      - ./docker/Caddyfile.server:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  caddy_data:
  caddy_config:
