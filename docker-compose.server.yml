# ── Moonlight server deployment ───────────────────────────────────────────────
# Run with: docker compose -f docker-compose.server.yml up -d
# Native Linux Docker — no Colima, production frontend build
#
# Resource budget: 25% of host (16 CPU / 60GB RAM)
#   = 4 CPUs, 15GB RAM max across all services
#   Total allocated: ~4.0 CPUs, ~14.6GB RAM
#
# Network bandwidth: Docker Compose does not natively support bandwidth limits.
# If needed, use Linux `tc` (traffic control) on the bridge interface:
#   tc qdisc add dev br-<id> root tbf rate 100mbit burst 32kbit latency 400ms

services:
  # ─── Databases & Infrastructure ───────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: jobharvest-postgres
    restart: unless-stopped
    command: >
      postgres
        -c random_page_cost=1.1
        -c seq_page_cost=1.0
        -c effective_cache_size=4GB
        -c shared_buffers=2GB
        -c work_mem=8MB
        -c effective_io_concurrency=200
        -c idle_in_transaction_session_timeout=30000
        -c max_connections=300
        -c max_parallel_workers=2
        -c max_parallel_workers_per_gather=1
        -c max_worker_processes=4
        -c maintenance_work_mem=256MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=64MB
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobharvest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobharvest}
      POSTGRES_DB: ${POSTGRES_DB:-jobharvest}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobharvest}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 2G

  redis:
    image: redis:7-alpine
    container_name: jobharvest-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 1G
        reservations:
          cpus: '0.125'
          memory: 512M

  ollama:
    image: ollama/ollama:latest
    container_name: jobharvest-ollama
    restart: unless-stopped
    environment:
      # Constrained to 25% budget — limit parallel inference
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-4}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-2}
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11435:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    # Pull both models on first start
    entrypoint: >
      sh -c "ollama serve &
             sleep 20 &&
             ollama pull ${OLLAMA_FAST_MODEL:-llama3.1:8b} &&
             ollama pull ${OLLAMA_MODEL:-llama3.1:70b} &&
             wait"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 2G

  # ─── Backend ──────────────────────────────────────────────────────────────

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobharvest-api
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=ollama
    volumes:
      - ./backend:/app
      - ./storage:/storage
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python scripts/ensure_auth.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

  # Worker 1 — general purpose (high concurrency)
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobharvest-celery-worker
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=ollama
      - CELERY_WORKER=true
    volumes:
      - ./backend:/app
      - ./storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # PAUSED: production crawls disabled, all capacity redirected to ml_test
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4 -Q ml_test,celery --prefetch-multiplier=1 --hostname=worker1@%h
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 1G

  # Worker 2 — second general purpose (lower concurrency)
  celery-worker-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobharvest-celery-worker-2
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=ollama
      - CELERY_WORKER=true
    volumes:
      - ./backend:/app
      - ./storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # PAUSED: production crawls disabled, all capacity redirected to ml_test
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2 -Q ml_test --prefetch-multiplier=1 --hostname=worker2@%h
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 1G
        reservations:
          cpus: '0.125'
          memory: 512M

  # Worker ML — LLM inference tasks (controlled concurrency)
  celery-worker-ml:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobharvest-celery-worker-ml
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=ollama
      - CELERY_WORKER=true
    volumes:
      - ./backend:/app
      - ./storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # PAUSED: production ML tasks disabled, capacity redirected to ml_test
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2 -Q ml_test --prefetch-multiplier=1 --hostname=worker-ml@%h
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 1G
        reservations:
          cpus: '0.125'
          memory: 512M

  # Worker ML Test — dedicated worker for A/B model test runs (never blocked by enrichment)
  celery-worker-ml-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobharvest-celery-worker-ml-test
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=ollama
      - CELERY_WORKER=true
    volumes:
      - ./backend:/app
      - ./storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=1 -Q ml_test --prefetch-multiplier=1 --hostname=worker-ml-test@%h
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobharvest-celery-beat
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - OLLAMA_HOST=ollama
      - CELERY_WORKER=true
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 128M

  # ─── Frontend — production nginx build ────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobharvest-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 128M

  # ─── Reverse Proxy ────────────────────────────────────────────────────────

  caddy:
    image: caddy:2-alpine
    container_name: jobharvest-caddy
    restart: unless-stopped
    ports:
      - "9080:80"
      - "9443:443"
    volumes:
      - ./docker/Caddyfile.server:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend
    deploy:
      resources:
        limits:
          cpus: '0.05'
          memory: 128M
        reservations:
          cpus: '0.025'
          memory: 64M

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  caddy_data:
  caddy_config:

networks:
  default:
    driver_opts:
      com.docker.network.bridge.host_binding_ipv4: "0.0.0.0"
